<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Control360 — Información del Equipo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo: #e63946;
      --rojo-light: #fff0f0;
      --verde: #2d6a4f;
      --verde-light: #d8f3dc;
      --naranja: #f4a261;
      --naranja-light: #fff3e0;
      --gris: #f8f9fa;
      --gris2: #e9ecef;
      --texto: #1a1a2e;
      --texto2: #6c757d;
      --blanco: #ffffff;
      --sombra: 0 4px 24px rgba(0,0,0,0.08);
      --radio: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gris);
      color: var(--texto);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── SPLASH PROMO ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash img {
      width: 100%; height: 100%; object-fit: contain; opacity: 0.95;
    }
    #splash-skip {
      position: absolute; bottom: 32px; right: 24px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3); color: #fff;
      padding: 10px 20px; border-radius: 30px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    #splash-timer {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    #splash.oculto { opacity: 0; pointer-events: none; }

    /* ── CONTENIDO PRINCIPAL ── */
    #app { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

    /* ── HEADER EMPRESA ── */
    .header-empresa {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 20px;
      box-shadow: var(--sombra);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 16px;
    }
    .header-empresa img {
      width: 64px; height: 64px; object-fit: contain; border-radius: 12px;
      border: 1px solid var(--gris2); flex-shrink: 0;
    }
    .header-empresa .empresa-inicial {
      width: 64px; height: 64px; border-radius: 12px;
      background: linear-gradient(135deg, #e63946, #c1121f);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .empresa-nombre { font-size: 16px; font-weight: 700; color: var(--texto); }
    .empresa-sub { font-size: 12px; color: var(--texto2); margin-top: 2px; }

    /* ── ALERTA VENCIMIENTO ── */
    .alerta-vencido {
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: #fff; border-radius: var(--radio); padding: 20px;
      margin-bottom: 16px; text-align: center;
      box-shadow: 0 8px 32px rgba(230,57,70,0.3);
      animation: pulsar 2s infinite;
    }
    .alerta-proximo {
      background: linear-gradient(135deg, #f4a261, #e76f51);
      color: #fff; border-radius: var(--radio); padding: 20px;
      margin-bottom: 16px; text-align: center;
      box-shadow: 0 8px 32px rgba(244,162,97,0.3);
    }
    @keyframes pulsar {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.01); }
    }
    .alerta-icon { font-size: 36px; margin-bottom: 8px; }
    .alerta-titulo { font-size: 18px; font-weight: 800; }
    .alerta-sub { font-size: 13px; opacity: 0.9; margin-top: 4px; }

    /* ── CARD EXTINTOR ── */
    .card {
      background: var(--blanco); border-radius: var(--radio);
      padding: 20px; box-shadow: var(--sombra); margin-bottom: 16px;
    }
    .card-titulo {
      font-size: 11px; font-weight: 700; color: var(--texto2);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-titulo::after {
      content: ''; flex: 1; height: 1px; background: var(--gris2);
    }

    /* Badge tipo */
    .badge-tipo {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1a1a2e; color: #fff;
      padding: 8px 16px; border-radius: 30px;
      font-size: 15px; font-weight: 700; margin-bottom: 16px;
    }
    .badge-co2 { background: linear-gradient(135deg, #0077b6, #023e8a); }
    .badge-abc { background: linear-gradient(135deg, #2d6a4f, #1b4332); }
    .badge-bc { background: linear-gradient(135deg, #7209b7, #480ca8); }

    /* Grid de info */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item { background: var(--gris); border-radius: 10px; padding: 12px; }
    .info-label { font-size: 10px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .info-valor { font-size: 14px; font-weight: 600; color: var(--texto); }
    .info-item.vencido .info-valor { color: var(--rojo); }
    .info-item.ok .info-valor { color: var(--verde); }
    .info-item.full { grid-column: 1 / -1; }

    /* Propietario */
    .propietario {
      display: flex; align-items: center; gap: 12px;
      background: #f0f7ff; border-radius: 10px; padding: 14px;
      margin-bottom: 12px;
    }
    .prop-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #0077b6, #023e8a);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .prop-nombre { font-size: 15px; font-weight: 700; color: var(--texto); }
    .prop-sub { font-size: 12px; color: var(--texto2); margin-top: 1px; }

    /* ── BOTONES ACCIÓN ── */
    .btn-wa {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 10px; box-shadow: 0 4px 16px rgba(37,211,102,0.3);
      transition: transform 0.15s;
    }
    .btn-wa:active { transform: scale(0.98); }

    .btn-web {
      width: 100%; padding: 14px; border: 2px solid var(--gris2); border-radius: 14px;
      background: var(--blanco); color: var(--texto); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 10px; transition: all 0.15s;
    }
    .btn-web:active { background: var(--gris); }

    .btn-lista {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 16px rgba(26,26,46,0.2); transition: transform 0.15s;
    }
    .btn-lista:active { transform: scale(0.98); }

    /* ── MODAL LISTA EQUIPOS ── */
    #modal-lista {
      position: fixed; inset: 0; z-index: 888;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #modal-lista.visible { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--blanco); width: 100%; max-width: 500px;
      border-radius: 24px 24px 0 0; max-height: 90vh; overflow: hidden;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    #modal-lista.visible .modal-sheet { transform: translateY(0); }

    .modal-handle { width: 40px; height: 4px; background: var(--gris2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .modal-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
    .modal-titulo { font-size: 18px; font-weight: 800; }
    .modal-sub { font-size: 12px; color: var(--texto2); margin-top: 2px; }
    .modal-cerrar { background: var(--gris); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .modal-acciones { padding: 0 20px 12px; display: flex; gap: 8px; flex-shrink: 0; }
    .btn-imprimir-lista {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .modal-body { overflow-y: auto; padding: 0 16px 24px; flex: 1; }

    /* Membrete modal */
    .membrete { display: flex; align-items: center; gap: 12px; padding: 12px 0 16px; border-bottom: 2px solid var(--gris2); margin-bottom: 16px; }
    .membrete img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
    .membrete-nombre { font-size: 14px; font-weight: 800; }
    .membrete-sub { font-size: 11px; color: var(--texto2); }

    /* ── ÚLTIMA INSPECCIÓN (vista individual) ── */
    .insp-card {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px;
      padding: 14px 16px; margin-top: 12px;
    }
    .insp-card.novedad { background: #fffbeb; border-color: #fde68a; }
    .insp-card-titulo { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .insp-meta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
    .insp-meta-item { }
    .insp-meta-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; }
    .insp-meta-valor { font-size: 13px; font-weight: 600; color: #374151; margin-top: 1px; }

    /* ── TABLA REPORTE IMPRIMIBLE ── */
    .rpt-tabla-wrap { overflow-x: auto; margin-bottom: 16px; }
    .rpt-tabla { width: 100%; border-collapse: collapse; font-size: 10px; font-family: 'DM Sans', sans-serif; }
    .rpt-tabla thead tr:first-child th { background: #1a1a2e; color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; padding: 6px 4px; text-align: center; border: 1px solid #374151; }
    .rpt-tabla thead tr:last-child th { background: #374151; color: rgba(255,255,255,0.8); font-size: 8px; font-weight: 600; padding: 4px 3px; text-align: center; border: 1px solid #4b5563; }
    .rpt-tabla td { padding: 5px 4px; border: 1px solid #e5e7eb; color: #374151; vertical-align: middle; text-align: center; line-height: 1.3; font-size: 10px; }
    .rpt-tabla td.td-left { text-align: left; }
    .rpt-tabla tr:nth-child(even) td { background: #f9fafb; }
    .rpt-tabla tr.fila-vencida td { background: #fff0f0; }
    .rpt-ok { color: #16a34a; font-size: 12px; font-weight: 700; }
    .rpt-mal { color: #dc2626; font-size: 12px; font-weight: 700; }
    .rpt-nov { color: #d97706; font-size: 12px; font-weight: 700; }
    .rpt-sin { color: #d1d5db; font-size: 11px; }
    .rpt-badge-ok { background: #dcfce7; color: #166534; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-badge-nov { background: #fef3c7; color: #92400e; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-badge-sin { background: #f3f4f6; color: #9ca3af; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-obs { font-size: 9px; color: #92400e; font-style: italic; text-align: left; }
    .rpt-cod { font-size: 9px; font-weight: 700; color: #7c3aed; white-space: nowrap; }

    /* Barra resumen cliente */
    .rpt-cliente-bar { background: #f0f7ff; border-bottom: 1px solid #dbeafe; padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 12px; border-radius: 8px; }
    .rpt-meta-label { font-size: 9px; font-weight: 700; color: #9ca3af; text-transform: uppercase; }
    .rpt-meta-valor { font-size: 12px; font-weight: 700; color: #1a1a2e; margin-top: 1px; }

    /* Footer reporte */
    .rpt-footer { border-top: 2px solid #e5e7eb; padding: 10px 0 0; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .rpt-footer-msg { font-size: 11px; color: #374151; }
    .rpt-footer-msg strong { color: #e63946; }
    .rpt-footer-c360 { font-size: 9px; color: #9ca3af; text-align: right; }
    .rpt-footer-c360 a { color: #7c3aed; text-decoration: none; font-weight: 700; }

    /* ── FOOTER ── */
    .footer-c360 {
      text-align: center; padding: 24px 0 8px;
      font-size: 11px; color: var(--texto2);
    }
    .footer-c360 a { color: #e63946; font-weight: 700; text-decoration: none; }

    /* ── LOADING ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--gris2); border-top-color: var(--rojo);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ── */
    .error-state {
      text-align: center; padding: 48px 24px;
    }
    .error-icon { font-size: 56px; margin-bottom: 16px; }
    .error-titulo { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .error-sub { font-size: 14px; color: var(--texto2); }

    /* Impresión */
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body { background: #fff; padding: 0; }
      #modal-lista { position: static; opacity: 1; pointer-events: all; display: block; }
      .modal-sheet { max-height: none; transform: none; border-radius: 0; box-shadow: none; }
      .modal-handle, .modal-cerrar, .modal-acciones, #app { display: none !important; }
      .modal-header { padding: 0 0 12px; }
      .rpt-tabla { font-size: 8px; }
      .rpt-tabla thead tr:first-child th, .rpt-tabla thead tr:last-child th { font-size: 7px; padding: 4px 3px; }
      .rpt-tabla td { padding: 3px 3px; font-size: 8px; }
    }

    @media (max-width: 360px) {
      .rpt-tabla { font-size: 9px; }
    }
  </style>
</head>
<body>

<!-- SPLASH PUBLICITARIO -->
<div id="splash" style="display:none;">
  <img id="splash-img" src="" alt="Promoción" />
  <button id="splash-skip" onclick="cerrarSplash()">
    <span id="splash-timer">5</span>
    Saltar
  </button>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="font-size:14px;color:#6c757d">Cargando información del equipo...</span>
  </div>
</div>

<!-- MODAL LISTA DE EQUIPOS -->
<div id="modal-lista">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo" id="lista-titulo">Mis Extintores</div>
        <div class="modal-sub" id="lista-sub"></div>
      </div>
      <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-acciones">
      <button class="btn-imprimir-lista" onclick="imprimirLista()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="modal-body" id="lista-body"></div>
  </div>
</div>

<script>
  const API = 'https://control360-v2-production.up.railway.app/api';
  let datosCargados = null;
  let splashTimer = null;

  // ── OBTENER CÓDIGO DEL QR ──────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get('c') || params.get('codigo') || '';

  if (!codigo) {
    mostrarError('Código QR no válido', 'El enlace escaneado no contiene un código de equipo válido.');
  } else {
    cargarDatos();
  }

  // ── CARGAR DATOS ──────────────────────────────────────────────────────────
  async function cargarDatos() {
    try {
      const res = await fetch(`${API}/qr/public/${encodeURIComponent(codigo)}`);
      if (!res.ok) throw new Error('Equipo no encontrado');
      const data = await res.json();
      datosCargados = data;

      // Mostrar splash si hay imagen promo
      if (data.imagenPromo) {
        mostrarSplash(data.imagenPromo, data.duracionPromo || 4);
      }

      renderApp(data);
    } catch (e) {
      mostrarError('Equipo no encontrado', 'No pudimos encontrar información para este código QR. Contacta al proveedor del servicio.');
    }
  }

  // ── SPLASH ────────────────────────────────────────────────────────────────
  function mostrarSplash(url, segundos) {
    const splash = document.getElementById('splash');
    const img = document.getElementById('splash-img');
    const timerEl = document.getElementById('splash-timer');
    img.src = url;
    splash.style.display = 'flex';
    let restante = segundos;
    timerEl.textContent = restante;
    splashTimer = setInterval(() => {
      restante--;
      timerEl.textContent = restante;
      if (restante <= 0) cerrarSplash();
    }, 1000);
  }

  function cerrarSplash() {
    clearInterval(splashTimer);
    const splash = document.getElementById('splash');
    splash.classList.add('oculto');
    setTimeout(() => splash.style.display = 'none', 500);
  }

  // ── FORMATEAR FECHA ───────────────────────────────────────────────────────
  function fmtFecha(f) {
    if (!f) return '—';
    try {
      const d = new Date(f);
      return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch { return '—'; }
  }

  function getTipoBadgeClass(tipo) {
    const t = (tipo || '').toUpperCase();
    if (t.includes('CO2')) return 'badge-co2';
    if (t.includes('BC') && !t.includes('ABC')) return 'badge-bc';
    return 'badge-abc';
  }

  // ── RENDER PRINCIPAL ──────────────────────────────────────────────────────
  function renderApp(data) {
    const app = document.getElementById('app');
    const empresa = data.empresa || {};
    const vencido = data.vencido;
    const alertaProximo = data.alertaVencimiento;

    let html = '';

    // Header empresa
    html += `<div class="header-empresa">`;
    if (empresa.logo) {
      html += `<img src="${empresa.logo}" alt="${empresa.nombre}" />`;
    } else {
      html += `<div class="empresa-inicial">${(empresa.nombre || 'E')[0]}</div>`;
    }
    html += `<div>
      <div class="empresa-nombre">${empresa.nombre || 'Servicio de Extintores'}</div>
      <div class="empresa-sub">🔧 Servicio técnico autorizado</div>
    </div></div>`;

    // Alerta vencimiento
    if (vencido) {
      html += `<div class="alerta-vencido">
        <div class="alerta-icon">🚨</div>
        <div class="alerta-titulo">¡Extintor VENCIDO!</div>
        <div class="alerta-sub">Este equipo venció hace ${Math.abs(data.diasParaVencer)} días. Solicita tu recarga inmediatamente.</div>
      </div>`;
    } else if (alertaProximo) {
      html += `<div class="alerta-proximo">
        <div class="alerta-icon">⏰</div>
        <div class="alerta-titulo">Próximo vencimiento en ${data.diasParaVencer} días</div>
        <div class="alerta-sub">Programa tu servicio de recarga con anticipación.</div>
      </div>`;
    }

    // Card info extintor
    html += `<div class="card">
      <div class="card-titulo">🧯 Información del equipo</div>`;

    // Propietario
    if (data.propietario) {
      html += `<div class="propietario">
        <div class="prop-avatar">${data.propietario[0]}</div>
        <div>
          <div class="prop-nombre">${data.propietario}</div>
          <div class="prop-sub">${data.ubicacion || 'Propietario registrado'}</div>
        </div>
      </div>`;
    }

    // Badge tipo
    html += `<div class="badge-tipo ${getTipoBadgeClass(data.tipo)}">
      🧯 ${data.tipo || 'EXTINTOR'} — ${data.capacidad || ''}
    </div>`;

    // Grid de fechas
    html += `<div class="info-grid">
      <div class="info-item">
        <div class="info-label">📅 Fecha de recarga</div>
        <div class="info-valor">${fmtFecha(data.fechaUltimaRecarga)}</div>
      </div>
      <div class="info-item ${vencido ? 'vencido' : 'ok'}">
        <div class="info-label">⏳ Próxima recarga</div>
        <div class="info-valor">${fmtFecha(data.proximaRecarga)}</div>
      </div>`;

    // CO2: fechas adicionales
    if (data.requierePH) {
      html += `<div class="info-item">
        <div class="info-label">🧪 Última prueba PH</div>
        <div class="info-valor">${fmtFecha(data.fechaPH)}</div>
      </div>
      <div class="info-item">
        <div class="info-label">🔧 Próx. mantenimiento</div>
        <div class="info-valor">${fmtFecha(data.proximoMantenimiento)}</div>
      </div>`;
    }

    // Ubicación y notas
    if (data.ubicacion) {
      html += `<div class="info-item full">
        <div class="info-label">📍 Ubicación</div>
        <div class="info-valor">${data.ubicacion}</div>
      </div>`;
    }
    if (data.notas) {
      html += `<div class="info-item full">
        <div class="info-label">📝 Notas</div>
        <div class="info-valor" style="font-size:13px;font-style:italic">${data.notas}</div>
      </div>`;
    }

    html += `</div></div>`; // cierre info-grid y card

    // ── ÚLTIMA INSPECCIÓN (vista individual) ──────────────────────────────────
    if (data.ultimaInspeccion) {
      const ins = data.ultimaInspeccion;
      const esNovedad = ins.resultado !== 'aprobado';
      html += `<div class="card">
        <div class="card-titulo">📋 Última inspección mensual</div>
        <div class="insp-card${esNovedad ? ' novedad' : ''}">
          <div class="insp-meta-row">
            <div class="insp-meta-item">
              <div class="insp-meta-label">📅 Fecha</div>
              <div class="insp-meta-valor">${fmtFecha(ins.fecha)}</div>
            </div>
            ${ins.hora ? `<div class="insp-meta-item">
              <div class="insp-meta-label">🕐 Hora</div>
              <div class="insp-meta-valor">${ins.hora}</div>
            </div>` : ''}
            <div class="insp-meta-item">
              <div class="insp-meta-label">👤 Inspector</div>
              <div class="insp-meta-valor">${ins.inspectorNombre || '—'}</div>
            </div>
            <div class="insp-meta-item">
              <div class="insp-meta-label">Resultado</div>
              <div class="insp-meta-valor" style="color:${esNovedad ? '#d97706' : '#16a34a'}">${esNovedad ? '⚠️ Con novedad' : '✅ Todo en buen estado'}</div>
            </div>
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="card">
        <div class="card-titulo">📋 Inspección mensual</div>
        <div style="text-align:center;padding:16px 0;color:#9ca3af;font-size:13px">
          📭 Sin inspecciones registradas<br/>
          <span style="font-size:11px">Sé el primero en registrar la inspección mensual</span>
        </div>
      </div>`;
    }
    html += `<div>`;

    // WhatsApp (siempre visible, urgente si vencido)
    const waNum = (empresa.whatsapp || '').replace(/\D/g, '');
    let waMensaje = vencido
      ? `Hola, escaneé el QR del extintor ${data.codigoQR} y está VENCIDO. ¿Cuándo pueden hacer la recarga?`
      : alertaProximo
      ? `Hola, mi extintor ${data.codigoQR} vence en ${data.diasParaVencer} días. ¿Pueden programar la recarga?`
      : `Hola, escaneé el QR de mi extintor ${data.codigoQR}. Quisiera más información sobre el servicio.`;
    const waUrl = waNum ? `https://wa.me/57${waNum}?text=${encodeURIComponent(waMensaje)}` : `https://wa.me/?text=${encodeURIComponent(waMensaje)}`;

    html += `<a href="${waUrl}" target="_blank" style="text-decoration:none">
      <button class="btn-wa">
        💬 ${vencido || alertaProximo ? 'Solicitar recarga ahora' : 'Contactar por WhatsApp'}
      </button>
    </a>`;

    // Página web
    if (empresa.web) {
      html += `<a href="${empresa.web.startsWith('http') ? empresa.web : 'https://' + empresa.web}" target="_blank" style="text-decoration:none">
        <button class="btn-web">🌐 Visitar nuestro sitio web</button>
      </a>`;
    }

    // Ver todos los extintores (solo si tiene clienteId)
    if (data.clienteId) {
      html += `<button class="btn-lista" onclick="verTodosEquipos('${data.clienteId}', '${data.adminId}', '${data.propietario || ''}')">
        📋 Ver todos mis extintores
      </button>`;
    }

    html += `</div>`; // cierre botones

    // Footer Control360
    html += `<div class="footer-c360">
      🔒 Información generada por <a href="https://control360.app" target="_blank">Control360</a><br/>
      Sistema operativo para empresas de servicios
    </div>`;

    document.getElementById('loading').style.display = 'none';
    app.innerHTML = html;
  }

  // ── VER TODOS LOS EQUIPOS ─────────────────────────────────────────────────
  const CHECKLIST_LABELS = [
    { id: 'ubicacion',    label: 'Ubic.' },
    { id: 'manometro',   label: 'Manóm.' },
    { id: 'seguro',      label: 'Seguro' },
    { id: 'cilindro',    label: 'Cilind.' },
    { id: 'valvula',     label: 'Válvula' },
    { id: 'manguera',    label: 'Mang.' },
    { id: 'etiqueta',    label: 'Etiquet.' },
    { id: 'senalizacion',label: 'Señaliz.' },
  ];

  function iconCheck(val) {
    if (!val || val === '') return '<span class="rpt-sin">—</span>';
    if (val === 'bien') return '<span class="rpt-ok">✓</span>';
    if (val === 'novedad') return '<span class="rpt-nov">⚠</span>';
    if (val === 'mal') return '<span class="rpt-mal">✗</span>';
    return '<span class="rpt-sin">—</span>';
  }

  async function verTodosEquipos(clienteId, adminId, propietario) {
    const modal = document.getElementById('modal-lista');
    const body = document.getElementById('lista-body');
    const titulo = document.getElementById('lista-titulo');
    const sub = document.getElementById('lista-sub');

    titulo.textContent = propietario || 'Mis Extintores';
    body.innerHTML = '<div class="loading" style="min-height:200px"><div class="spinner"></div></div>';
    modal.classList.add('visible');

    try {
      const res = await fetch(`${API}/qr/public/cliente/${clienteId}?adminId=${adminId}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const empresa = data.empresa || {};

      const totalInsp = data.equipos.filter(e => e.ultimaInspeccion).length;
      const sinInsp = data.equipos.length - totalInsp;
      const conNovedad = data.equipos.filter(e => e.ultimaInspeccion && e.ultimaInspeccion.resultado !== 'aprobado').length;

      sub.textContent = `${data.totalEquipos} equipo${data.totalEquipos !== 1 ? 's' : ''}${data.equiposVencidos > 0 ? ` · ${data.equiposVencidos} vencido${data.equiposVencidos !== 1 ? 's' : ''}` : ''}`;

      let html = '';

      // Membrete
      html += `<div class="membrete">
        ${empresa.logo
          ? `<img src="${empresa.logo}" alt="${empresa.nombre}" />`
          : `<div style="width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#e63946,#c1121f);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0">${(empresa.nombre || 'E')[0]}</div>`}
        <div>
          <div class="membrete-nombre">${empresa.nombre || ''}</div>
          <div class="membrete-sub">Reporte de inspección mensual — ${propietario} · ${new Date().toLocaleDateString('es-CO')}</div>
        </div>
      </div>`;

      // Barra resumen
      html += `<div class="rpt-cliente-bar">
        <div><div class="rpt-meta-label">Total equipos</div><div class="rpt-meta-valor">${data.totalEquipos}</div></div>
        <div><div class="rpt-meta-label">Inspeccionados</div><div class="rpt-meta-valor" style="color:#16a34a">${totalInsp}</div></div>
        <div><div class="rpt-meta-label">Sin inspección</div><div class="rpt-meta-valor" style="color:#d97706">${sinInsp}</div></div>
        <div><div class="rpt-meta-label">Con novedad</div><div class="rpt-meta-valor" style="color:#dc2626">${conNovedad}</div></div>
      </div>`;

      if (data.equipos.length === 0) {
        html += `<div style="text-align:center;padding:32px;color:#6c757d">Sin equipos registrados</div>`;
      } else {
        html += `<div class="rpt-tabla-wrap"><table class="rpt-tabla">
          <thead>
            <tr>
              <th rowspan="2">No.</th>
              <th rowspan="2">Código</th>
              <th rowspan="2">Tipo</th>
              <th rowspan="2">Cap.</th>
              <th rowspan="2">Ubicación</th>
              <th rowspan="2">F. Recarga</th>
              <th rowspan="2">F. Vence</th>
              <th rowspan="2">F. PH</th>
              <th colspan="8">Checklist de inspección</th>
              <th rowspan="2">Resultado</th>
              <th rowspan="2">F. Inspección</th>
              <th rowspan="2">Inspector</th>
              <th rowspan="2">Novedades / Observaciones</th>
            </tr>
            <tr>
              ${CHECKLIST_LABELS.map(c => `<th>${c.label}</th>`).join('')}
            </tr>
          </thead>
          <tbody>`;

        data.equipos.forEach((eq, i) => {
          const ins = eq.ultimaInspeccion;
          const cl = ins?.checklist || {};
          const esNov = ins && ins.resultado !== 'aprobado';
          const filaClass = eq.vencido ? 'fila-vencida' : '';

          html += `<tr class="${filaClass}">
            <td>${i + 1}</td>
            <td class="rpt-cod">${eq.codigoQR || '—'}</td>
            <td class="td-left">${eq.tipo || '—'}</td>
            <td>${eq.capacidad || '—'}</td>
            <td class="td-left">${eq.ubicacion || '—'}</td>
            <td>${fmtFecha(eq.fechaUltimaRecarga)}</td>
            <td style="${eq.vencido ? 'color:#dc2626;font-weight:700' : ''}">${fmtFecha(eq.proximaRecarga)}${eq.vencido ? ' ⚠' : ''}</td>
            <td>${eq.requierePH ? fmtFecha(eq.fechaPH) : '<span class="rpt-sin">—</span>'}</td>
            ${CHECKLIST_LABELS.map(c => `<td>${ins ? iconCheck(cl[c.id]) : '<span class="rpt-sin">—</span>'}</td>`).join('')}
            <td>${ins
              ? (esNov ? '<span class="rpt-badge-nov">⚠ Novedad</span>' : '<span class="rpt-badge-ok">✅ Ok</span>')
              : '<span class="rpt-badge-sin">Sin insp.</span>'}</td>
            <td>${ins ? fmtFecha(ins.fecha) : '<span class="rpt-sin">—</span>'}</td>
            <td class="td-left">${ins ? (ins.inspectorNombre || '—') : '<span class="rpt-sin">—</span>'}</td>
            <td class="rpt-obs">${ins?.observaciones ? ins.observaciones : '<span class="rpt-sin">—</span>'}</td>
          </tr>`;
        });

        html += `</tbody></table></div>`;
      }

      // Footer del reporte
      html += `<div class="rpt-footer">
        <div class="rpt-footer-msg">
          Si su equipo presenta <strong>novedades</strong>, comuníquese para programar una visita técnica. Su seguridad es nuestra prioridad.
          ${empresa.phone || empresa.cellphone ? `<br/><span style="font-size:10px;color:#6b7280">📞 ${empresa.phone || empresa.cellphone}</span>` : ''}
        </div>
        <div class="rpt-footer-c360">
          Generado por <a href="https://tucontrol360.com" target="_blank">tucontrol360.com</a><br/>
          Sistema operativo para empresas de servicios
        </div>
      </div>`;

      body.innerHTML = html;
    } catch (e) {
      body.innerHTML = '<div style="padding:32px;text-align:center;color:#e63946">Error al cargar equipos</div>';
    }
  }

  function cerrarModal() {
    document.getElementById('modal-lista').classList.remove('visible');
  }

  function imprimirLista() {
    document.getElementById('modal-lista').classList.add('visible');
    setTimeout(() => window.print(), 300);
  }

  // Cerrar modal tocando el fondo
  document.getElementById('modal-lista').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  // ── ERROR ─────────────────────────────────────────────────────────────────
  function mostrarError(titulo, sub) {
    document.getElementById('app').innerHTML = `
      <div class="error-state">
        <div class="error-icon">🔍</div>
        <div class="error-titulo">${titulo}</div>
        <div class="error-sub">${sub}</div>
      </div>
      <div class="footer-c360">
        Powered by <a href="https://control360.app" target="_blank">Control360</a>
      </div>`;
    document.getElementById('loading').style.display = 'none';
  }
</script>
</body>
</html>
