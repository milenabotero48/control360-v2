<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Control360 — Información del Equipo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #e63946; --rojo-light: #fff0f0;
      --verde: #2d6a4f; --verde-light: #d8f3dc;
      --naranja: #f4a261; --naranja-light: #fff3e0;
      --morado: #7c3aed; --morado-light: #f5f3ff;
      --gris: #f8f9fa; --gris2: #e9ecef;
      --texto: #1a1a2e; --texto2: #6c757d;
      --blanco: #ffffff;
      --sombra: 0 4px 24px rgba(0,0,0,0.08);
      --radio: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gris); color: var(--texto); min-height: 100vh; padding-bottom: 40px; }

    /* SPLASH — object-fit: contain para que la imagen promo se vea completa */
    #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    #splash img { width: 100%; height: 100%; object-fit: contain; opacity: 0.95; }
    #splash-skip { position: absolute; bottom: 32px; right: 24px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    #splash-timer { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    #splash.oculto { opacity: 0; pointer-events: none; }

    #app { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--gris2); border-top-color: var(--rojo); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .header-empresa { background: var(--blanco); border-radius: var(--radio); padding: 20px; box-shadow: var(--sombra); margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
    .header-empresa img { width: 64px; height: 64px; object-fit: contain; border-radius: 12px; border: 1px solid var(--gris2); flex-shrink: 0; }
    .header-empresa .empresa-inicial { width: 64px; height: 64px; border-radius: 12px; background: linear-gradient(135deg, #e63946, #c1121f); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .empresa-nombre { font-size: 16px; font-weight: 700; color: var(--texto); }
    .empresa-sub { font-size: 12px; color: var(--texto2); margin-top: 2px; }

    .alerta-vencido { background: linear-gradient(135deg, #e63946, #c1121f); color: #fff; border-radius: var(--radio); padding: 20px; margin-bottom: 16px; text-align: center; box-shadow: 0 8px 32px rgba(230,57,70,0.3); animation: pulsar 2s infinite; }
    .alerta-proximo { background: linear-gradient(135deg, #f4a261, #e76f51); color: #fff; border-radius: var(--radio); padding: 20px; margin-bottom: 16px; text-align: center; box-shadow: 0 8px 32px rgba(244,162,97,0.3); }
    @keyframes pulsar { 0%,100%{transform:scale(1)} 50%{transform:scale(1.01)} }
    .alerta-icon { font-size: 36px; margin-bottom: 8px; }
    .alerta-titulo { font-size: 18px; font-weight: 800; }
    .alerta-sub { font-size: 13px; opacity: 0.9; margin-top: 4px; }

    .card { background: var(--blanco); border-radius: var(--radio); padding: 20px; box-shadow: var(--sombra); margin-bottom: 16px; }
    .card-titulo { font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-titulo::after { content: ''; flex: 1; height: 1px; background: var(--gris2); }
    .badge-tipo { display: inline-flex; align-items: center; gap: 8px; background: #1a1a2e; color: #fff; padding: 8px 16px; border-radius: 30px; font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .badge-co2 { background: linear-gradient(135deg, #0077b6, #023e8a); }
    .badge-abc { background: linear-gradient(135deg, #2d6a4f, #1b4332); }
    .badge-bc  { background: linear-gradient(135deg, #7209b7, #480ca8); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item { background: var(--gris); border-radius: 10px; padding: 12px; }
    .info-label { font-size: 10px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .info-valor { font-size: 14px; font-weight: 600; color: var(--texto); }
    .info-item.vencido .info-valor { color: var(--rojo); }
    .info-item.ok .info-valor { color: var(--verde); }
    .info-item.full { grid-column: 1 / -1; }
    .propietario { display: flex; align-items: center; gap: 12px; background: #f0f7ff; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .prop-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0077b6, #023e8a); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .prop-nombre { font-size: 15px; font-weight: 700; }
    .prop-sub { font-size: 12px; color: var(--texto2); margin-top: 1px; }

    .ultima-insp { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .ultima-insp.aprobado { background: var(--verde-light); border: 1px solid #95d5b2; }
    .ultima-insp.novedad  { background: var(--naranja-light); border: 1px solid #ffb347; }
    .ultima-insp.atencion { background: var(--rojo-light); border: 1px solid #ffc1cc; }
    .ultima-insp.sin-insp { background: var(--gris); border: 1px dashed var(--gris2); }
    .insp-icon { font-size: 28px; flex-shrink: 0; }
    .insp-titulo { font-size: 13px; font-weight: 700; }
    .insp-sub { font-size: 11px; color: var(--texto2); margin-top: 2px; }

    .btn-wa { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #25d366, #128c7e); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; box-shadow: 0 4px 16px rgba(37,211,102,0.3); transition: transform 0.15s; }
    .btn-wa:active { transform: scale(0.98); }
    .btn-web { width: 100%; padding: 14px; border: 2px solid var(--gris2); border-radius: 14px; background: var(--blanco); color: var(--texto); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; transition: all 0.15s; }
    .btn-lista { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 16px rgba(26,26,46,0.2); transition: transform 0.15s; margin-bottom: 10px; }
    .btn-lista:active { transform: scale(0.98); }
    .btn-inspeccion { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 16px rgba(124,58,237,0.3); transition: transform 0.15s; margin-bottom: 10px; }
    .btn-inspeccion:active { transform: scale(0.98); }
    .btn-historial { width: 100%; padding: 13px; border: 2px solid #c4b5fd; border-radius: 14px; background: var(--morado-light); color: var(--morado); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; transition: all 0.15s; }

    .modal-overlay { position: fixed; inset: 0; z-index: 888; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-sheet { background: var(--blanco); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.visible .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--gris2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .modal-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; border-bottom: 1px solid var(--gris2); }
    .modal-titulo { font-size: 18px; font-weight: 800; }
    .modal-sub { font-size: 12px; color: var(--texto2); margin-top: 2px; }
    .modal-cerrar { background: var(--gris); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .modal-acciones { padding: 10px 16px; display: flex; gap: 8px; flex-shrink: 0; border-bottom: 1px solid var(--gris2); }
    .btn-imprimir-lista { flex: 1; padding: 10px; border: none; border-radius: 10px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .modal-body { overflow-y: auto; padding: 16px; flex: 1; }

    .checklist-item { background: var(--gris); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 2px solid transparent; transition: all 0.2s; }
    .checklist-item.ok      { background: var(--verde-light); border-color: #95d5b2; }
    .checklist-item.mal     { background: var(--rojo-light);  border-color: #ffc1cc; }
    .checklist-item.novedad { background: var(--naranja-light); border-color: #ffb347; }
    .check-label  { font-size: 15px; font-weight: 700; color: var(--texto); margin-bottom: 4px; }
    .check-desc   { font-size: 12px; color: var(--texto2); margin-bottom: 12px; line-height: 1.5; }
    .check-botones { display: flex; gap: 8px; }
    .check-btn { flex: 1; padding: 12px 6px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; background: var(--blanco); border: 2px solid var(--gris2); color: var(--texto2); }
    .check-btn.selected-ok      { background: #2d6a4f; border-color: #2d6a4f; color: #fff; transform: scale(1.03); }
    .check-btn.selected-mal     { background: #e63946; border-color: #e63946; color: #fff; transform: scale(1.03); }
    .check-btn.selected-novedad { background: #f4a261; border-color: #f4a261; color: #fff; transform: scale(1.03); }
    .novedad-obs { margin-top: 10px; }
    .novedad-obs textarea { width: 100%; border: 1.5px solid #fcd34d; border-radius: 8px; padding: 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: #fffbeb; resize: none; }

    .campo-grupo { margin-bottom: 14px; }
    .campo-label { font-size: 12px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .campo-input { width: 100%; border: 1.5px solid var(--gris2); border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; color: var(--texto); background: var(--blanco); transition: border-color 0.15s; }
    .campo-input:focus { border-color: var(--morado); }

    .resumen-check { border-radius: 12px; padding: 16px; margin: 16px 0; text-align: center; }
    .resumen-check.aprobado { background: var(--verde-light); }
    .resumen-check.mal      { background: var(--rojo-light); }
    .resumen-check.novedad  { background: var(--naranja-light); }
    .resumen-icon  { font-size: 40px; margin-bottom: 8px; }
    .resumen-texto { font-size: 15px; font-weight: 700; }
    .resumen-sub   { font-size: 12px; color: var(--texto2); margin-top: 4px; }

    .hist-item { background: var(--gris); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--gris2); }
    .hist-item.aprobado { border-left-color: #2d6a4f; }
    .hist-item.atencion { border-left-color: var(--rojo); }
    .hist-item.novedad  { border-left-color: var(--naranja); }
    .hist-fecha    { font-size: 12px; font-weight: 700; color: var(--texto2); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
    .hist-inspector { font-size: 14px; font-weight: 700; color: var(--texto); }
    .hist-badge    { display: inline-flex; align-items: center; gap: 4px; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; margin-top: 6px; }
    .hist-badge.aprobado { background: var(--verde-light); color: var(--verde); }
    .hist-badge.atencion { background: var(--rojo-light); color: var(--rojo); }
    .hist-badge.novedad  { background: var(--naranja-light); color: #c05c00; }
    .hist-novedades { font-size: 11px; color: var(--rojo); margin-top: 6px; line-height: 1.4; }

    .btn-guardar { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: all 0.15s; }
    .btn-guardar:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-guardar:not(:disabled):active { transform: scale(0.98); }
    .btn-ver-mas { width: 100%; padding: 12px; border: 2px solid var(--morado); border-radius: 10px; background: var(--morado-light); color: var(--morado); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; }

    .msg-error { background: var(--rojo-light); border: 1px solid #ffc1cc; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--rojo); margin-bottom: 12px; }
    .msg-exito  { background: var(--verde-light); border: 1px solid #95d5b2; border-radius: 10px; padding: 16px 14px; font-size: 14px; color: var(--verde); margin-bottom: 12px; text-align: center; }

    /* MEMBRETE Y TABLA REPORTE IMPRIMIBLE */
    .rpt-header { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; border-bottom: 3px solid #1a1a2e; }
    .rpt-header-left { display: flex; align-items: center; gap: 16px; }
    .rpt-logo { width: 80px; height: 80px; object-fit: contain; flex-shrink: 0; }
    .rpt-logo-inicial { width: 80px; height: 80px; border-radius: 10px; background: linear-gradient(135deg, #e63946, #c1121f); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .rpt-empresa-nombre { font-size: 15px; font-weight: 800; color: #1a1a2e; }
    .rpt-empresa-sub { font-size: 10px; color: #6b7280; margin-top: 3px; line-height: 1.6; }
    .rpt-header-right { text-align: right; }
    .rpt-doc-titulo { font-size: 13px; font-weight: 800; color: #1a1a2e; text-transform: uppercase; letter-spacing: 1px; }
    .rpt-doc-fecha { font-size: 10px; color: #9ca3af; margin-top: 4px; }

    .rpt-cliente-strip { background: #1a1a2e; padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 12px; border-radius: 0 0 0 0; }
    .rpt-meta-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    .rpt-meta-valor { font-size: 12px; font-weight: 700; color: #fff; margin-top: 1px; }

    /* legacy */
    .membrete { display: none; }
    .membrete-nombre { font-size: 14px; font-weight: 800; }
    .membrete-sub { font-size: 11px; color: var(--texto2); }
    .rpt-cliente-bar { display: none; }

    .rpt-tabla-wrap { overflow-x: auto; margin-bottom: 12px; }
    .rpt-tabla { width: 100%; border-collapse: collapse; font-size: 10px; }
    .rpt-tabla thead tr:first-child th { background: #1a1a2e; color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 6px 4px; text-align: center; border: 1px solid #374151; }
    .rpt-tabla thead tr:last-child th { background: #374151; color: rgba(255,255,255,0.8); font-size: 8px; font-weight: 600; padding: 4px 3px; text-align: center; border: 1px solid #4b5563; }
    .rpt-tabla td { padding: 5px 4px; border: 1px solid #e5e7eb; color: #374151; vertical-align: middle; text-align: center; font-size: 10px; line-height: 1.3; }
    .rpt-tabla td.td-left { text-align: left; }
    .rpt-tabla tr:nth-child(even) td { background: #f9fafb; }
    .rpt-tabla tr.fila-vencida td { background: #fff0f0; }
    .rpt-ok  { color: #16a34a; font-size: 12px; font-weight: 700; }
    .rpt-mal { color: #dc2626; font-size: 12px; font-weight: 700; }
    .rpt-nov { color: #d97706; font-size: 12px; font-weight: 700; }
    .rpt-sin { color: #d1d5db; font-size: 11px; }
    .rpt-badge-ok  { background: #dcfce7; color: #166534; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-badge-nov { background: #fef3c7; color: #92400e; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-badge-sin { background: #f3f4f6; color: #9ca3af; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .rpt-obs { font-size: 9px; color: #92400e; font-style: italic; text-align: left; }
    .rpt-cod { font-size: 9px; font-weight: 700; color: #7c3aed; white-space: nowrap; }
    .rpt-footer { border-top: 2px solid #e5e7eb; padding: 10px 0 0; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .rpt-footer-msg { font-size: 11px; color: #374151; }
    .rpt-footer-msg strong { color: #e63946; }
    .rpt-footer-c360 { font-size: 9px; color: #9ca3af; text-align: right; }
    .rpt-footer-c360 a { color: #7c3aed; text-decoration: none; font-weight: 700; }

    .footer-c360 { text-align: center; padding: 24px 0 8px; font-size: 11px; color: var(--texto2); }
    .footer-c360 a { color: #e63946; font-weight: 700; text-decoration: none; }

    .error-state { text-align: center; padding: 48px 24px; }
    .error-icon { font-size: 56px; margin-bottom: 16px; }
    .error-titulo { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .error-sub { font-size: 14px; color: var(--texto2); }

    @media print {
      @page { size: A4 landscape; margin: 6mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff; padding: 0; margin: 0; }
      #modal-lista { position: static !important; opacity: 1 !important; pointer-events: all !important; display: block !important; background: none !important; }
      .modal-sheet { max-height: none !important; max-width: 100% !important; width: 100% !important; transform: none !important; border-radius: 0 !important; box-shadow: none !important; display: block !important; }
      .modal-handle, .modal-cerrar, .modal-acciones, #app, #splash { display: none !important; }
      .modal-header { display: none !important; }
      .modal-body { overflow: visible !important; padding: 0 !important; }
      .rpt-header { border-radius: 0 !important; padding: 10px 16px !important; border: none !important; border-bottom: 3px solid #1a1a2e !important; }
      .rpt-cliente-strip { border-radius: 0 !important; }
      .rpt-tabla { font-size: 7.5px !important; }
      .rpt-tabla thead tr:first-child th { font-size: 7px !important; padding: 3px 2px !important; }
      .rpt-tabla thead tr:last-child th { font-size: 6.5px !important; padding: 3px 2px !important; }
      .rpt-tabla td { padding: 3px 2px !important; font-size: 7.5px !important; }
      .rpt-footer { margin-top: 6px !important; }
    }
  </style>
</head>
<body>

<div id="splash" style="display:none;">
  <img id="splash-img" src="" alt="Promo" />
  <button id="splash-skip" onclick="cerrarSplash()">
    <span id="splash-timer">5</span> Saltar
  </button>
</div>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="font-size:14px;color:#6c757d">Cargando información del equipo...</span>
  </div>
</div>

<!-- MODAL LISTA EQUIPOS -->
<div class="modal-overlay" id="modal-lista">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo" id="lista-titulo">Mis Extintores</div>
        <div class="modal-sub" id="lista-sub"></div>
      </div>
      <button class="modal-cerrar" onclick="cerrarModal('modal-lista')">✕</button>
    </div>
    <div class="modal-acciones">
      <button class="btn-imprimir-lista" onclick="imprimirLista()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="modal-body" id="lista-body"></div>
  </div>
</div>

<!-- MODAL INSPECCION -->
<div class="modal-overlay" id="modal-inspeccion">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo">📋 Inspección mensual</div>
        <div class="modal-sub" id="insp-codigo-sub"></div>
      </div>
      <button class="modal-cerrar" onclick="cerrarModal('modal-inspeccion')">✕</button>
    </div>
    <div class="modal-body" id="insp-body"></div>
  </div>
</div>

<!-- MODAL HISTORIAL -->
<div class="modal-overlay" id="modal-historial">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo">📅 Historial inspecciones</div>
        <div class="modal-sub" id="hist-codigo-sub"></div>
      </div>
      <button class="modal-cerrar" onclick="cerrarModal('modal-historial')">✕</button>
    </div>
    <div class="modal-body" id="hist-body"></div>
  </div>
</div>

<script>
  const API = 'https://control360-v2-production.up.railway.app/api';
  let datosCargados = null;
  let splashTimer = null;
  let histPagina = 1;
  let histHayMas = false;

  const params = new URLSearchParams(window.location.search);
  const codigo = params.get('c') || params.get('codigo') || '';
  const tenantParam = params.get('t') || '';

  const CHECKLIST = [
    { id: 'ubicacion',    label: 'Ubicación e instalación',       desc: 'Está en su lugar asignado, visible, señalizado y sin obstáculos frente a él' },
    { id: 'manometro',   label: 'Manómetro / Presión',           desc: 'La aguja está en la zona verde. Si no tiene manómetro, el sello plástico está intacto' },
    { id: 'seguro',      label: 'Seguro y sello plástico',       desc: 'El pasador de seguridad está puesto y el sello plástico no ha sido roto ni manipulado' },
    { id: 'cilindro',    label: 'Cilindro',                      desc: 'Sin golpes visibles, sin corrosión, sin óxido, pintura en buen estado' },
    { id: 'valvula',     label: 'Válvula',                       desc: 'Sin daños, sin fugas visibles, sin corrosión en la palanca o cuello' },
    { id: 'manguera',    label: 'Manguera / Boquilla / Corneta', desc: 'Sin fisuras, sin bloqueos, bien conectada, sin daño físico visible' },
    { id: 'etiqueta',    label: 'Etiqueta de servicio',          desc: 'La etiqueta del último mantenimiento está visible y legible con fecha de próxima recarga' },
    { id: 'senalizacion',label: 'Señalización',                  desc: 'La señal del extintor en la pared está visible y en buen estado' },
  ];

  const CHECKLIST_LABELS = [
    { id: 'ubicacion',    label: 'Ubic.'    },
    { id: 'manometro',   label: 'Manóm.'   },
    { id: 'seguro',      label: 'Seguro'   },
    { id: 'cilindro',    label: 'Cilind.'  },
    { id: 'valvula',     label: 'Válvula'  },
    { id: 'manguera',    label: 'Mang.'    },
    { id: 'etiqueta',    label: 'Etiquet.' },
    { id: 'senalizacion',label: 'Señaliz.' },
  ];

  function iconCheck(val) {
    if (!val) return '<span class="rpt-sin">—</span>';
    if (val === 'bien' || val === 'ok') return '<span class="rpt-ok">✓</span>';
    if (val === 'novedad') return '<span class="rpt-nov">⚠</span>';
    if (val === 'mal')     return '<span class="rpt-mal">✗</span>';
    return '<span class="rpt-sin">—</span>';
  }

  if (!codigo) {
    mostrarError('Código QR no válido', 'El enlace escaneado no contiene un código de equipo válido.');
  } else {
    cargarDatos();
  }

  async function cargarDatos() {
    try {
      const url = `${API}/qr/public/${encodeURIComponent(codigo)}${tenantParam ? '?t=' + tenantParam : ''}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();
      datosCargados = data;
      if (data.config?.imagenPromo) mostrarSplash(data.config.imagenPromo, data.config.tiempoSplash || 5);
      renderApp(data);
    } catch (e) {
      mostrarError('Equipo no encontrado', 'No pudimos encontrar información para este código QR. Contacta al proveedor del servicio.');
    }
  }

  function mostrarSplash(url, seg) {
    const splash = document.getElementById('splash');
    document.getElementById('splash-img').src = url;
    splash.style.display = 'flex';
    let r = seg;
    document.getElementById('splash-timer').textContent = r;
    splashTimer = setInterval(() => { r--; document.getElementById('splash-timer').textContent = r; if (r <= 0) cerrarSplash(); }, 1000);
  }
  function cerrarSplash() {
    clearInterval(splashTimer);
    const s = document.getElementById('splash');
    s.classList.add('oculto');
    setTimeout(() => s.style.display = 'none', 500);
  }

  function fmtFecha(f) {
    if (!f) return '—';
    try { return new Date(f).toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }); } catch { return '—'; }
  }
  function getTipoBadgeClass(tipo) {
    const t = (tipo || '').toUpperCase();
    if (t.includes('CO2')) return 'badge-co2';
    if (t.includes('BC') && !t.includes('ABC')) return 'badge-bc';
    return 'badge-abc';
  }
  function cerrarModal(id) { document.getElementById(id).classList.remove('visible'); }

  function renderApp(data) {
    const app = document.getElementById('app');
    const empresa = data.empresa || {};
    const vencido = data.vencido;
    const alertaProximo = data.alertaVencimiento;
    let html = '';

    html += `<div class="header-empresa">`;
    html += empresa.logo
      ? `<img src="${empresa.logo}" alt="${empresa.nombre}" />`
      : `<div class="empresa-inicial">${(empresa.nombre || 'E')[0]}</div>`;
    html += `<div><div class="empresa-nombre">${empresa.nombre || 'Servicio de Extintores'}</div>
      <div class="empresa-sub">🔧 Servicio técnico autorizado</div></div></div>`;

    if (vencido) {
      html += `<div class="alerta-vencido"><div class="alerta-icon">🚨</div>
        <div class="alerta-titulo">¡Extintor VENCIDO!</div>
        <div class="alerta-sub">Este equipo venció hace ${Math.abs(data.diasParaVencer)} días. Solicita tu recarga inmediatamente.</div></div>`;
    } else if (alertaProximo) {
      html += `<div class="alerta-proximo"><div class="alerta-icon">⏰</div>
        <div class="alerta-titulo">Próximo vencimiento en ${data.diasParaVencer} días</div>
        <div class="alerta-sub">Programa tu servicio de recarga con anticipación.</div></div>`;
    }

    html += `<div class="card"><div class="card-titulo">🧯 Información del equipo</div>`;
    if (data.propietario) {
      html += `<div class="propietario"><div class="prop-avatar">${data.propietario[0]}</div>
        <div><div class="prop-nombre">${data.propietario}</div>
        <div class="prop-sub">${data.ubicacion || 'Propietario registrado'}</div></div></div>`;
    }
    html += `<div class="badge-tipo ${getTipoBadgeClass(data.tipo)}">🧯 ${data.tipo || 'EXTINTOR'} — ${data.capacidad || ''}</div>`;
    html += `<div class="info-grid">
      <div class="info-item"><div class="info-label">📅 Fecha de recarga</div><div class="info-valor">${fmtFecha(data.fechaUltimaRecarga)}</div></div>
      <div class="info-item ${vencido ? 'vencido' : 'ok'}"><div class="info-label">⏳ Próxima recarga</div><div class="info-valor">${fmtFecha(data.proximaRecarga)}</div></div>`;
    if (data.requierePH) {
      html += `<div class="info-item"><div class="info-label">🧪 Última PH</div><div class="info-valor">${fmtFecha(data.fechaPH)}</div></div>
        <div class="info-item"><div class="info-label">🔧 Próx. mantenimiento</div><div class="info-valor">${fmtFecha(data.proximoMantenimiento)}</div></div>`;
    }
    if (data.ubicacion) {
      html += `<div class="info-item full"><div class="info-label">📍 Ubicación</div><div class="info-valor">${data.ubicacion}</div></div>`;
    }
    html += `</div>`;

    const ui = data.ultimaInspeccion;
    if (ui) {
      const cls = ui.resultado === 'aprobado' ? 'aprobado' : ui.resultado === 'con_novedad' ? 'novedad' : 'atencion';
      const icon = ui.resultado === 'aprobado' ? '✅' : ui.resultado === 'con_novedad' ? '⚠️' : '❌';
      const label = ui.resultado === 'aprobado' ? 'Aprobada' : ui.resultado === 'con_novedad' ? 'Con novedad' : 'Requiere atención';
      html += `<div class="ultima-insp ${cls}">
        <div class="insp-icon">${icon}</div>
        <div><div class="insp-titulo">Última inspección: ${label}</div>
        <div class="insp-sub">${ui.fecha || ''} ${ui.hora ? '· ' + ui.hora : ''} · ${(ui.inspectorNombre||'') + (ui.inspectorApellido ? ' '+ui.inspectorApellido : '')}</div></div></div>`;
    } else {
      html += `<div class="ultima-insp sin-insp">
        <div class="insp-icon">📋</div>
        <div><div class="insp-titulo">Sin inspecciones registradas</div>
        <div class="insp-sub">Sé el primero en registrar la inspección mensual</div></div></div>`;
    }
    html += `</div>`;

    const waNum = (empresa.whatsapp || '').replace(/\D/g, '');
    const waMensaje = vencido
      ? `Hola, escaneé el QR del extintor ${data.codigoQR} y está VENCIDO. ¿Cuándo pueden hacer la recarga?`
      : alertaProximo
      ? `Hola, mi extintor ${data.codigoQR} vence en ${data.diasParaVencer} días. ¿Pueden programar la recarga?`
      : `Hola, escaneé el QR de mi extintor ${data.codigoQR}. Quisiera más información.`;
    const waUrl = waNum ? `https://wa.me/57${waNum}?text=${encodeURIComponent(waMensaje)}` : '#';

    html += `<div>
      <button class="btn-inspeccion" onclick="abrirInspeccion()">📋 Registrar inspección mensual</button>`;
    if (ui) {
      html += `<button class="btn-historial" onclick="abrirHistorial()">📅 Ver historial de inspecciones</button>`;
    }
    html += `<a href="${waUrl}" target="_blank" style="text-decoration:none">
      <button class="btn-wa">💬 ${vencido || alertaProximo ? 'Solicitar recarga ahora' : 'Contactar por WhatsApp'}</button></a>`;
    if (empresa.web) {
      html += `<a href="${empresa.web.startsWith('http') ? empresa.web : 'https://' + empresa.web}" target="_blank" style="text-decoration:none">
        <button class="btn-web">🌐 Visitar sitio web</button></a>`;
    }
    if (data.clienteId) {
      html += `<button class="btn-lista" onclick="verTodosEquipos('${data.clienteId}', '${data.adminId}', '${(data.propietario || '').replace(/'/g, "\\'")}')">📋 Ver todos mis extintores</button>`;
    }
    html += `</div>`;

    html += `<div class="footer-c360">🔒 Información generada por <a href="https://tucontrol360.com" target="_blank">tucontrol360.com</a><br/>Sistema operativo para empresas de servicios</div>`;

    document.getElementById('loading').style.display = 'none';
    app.innerHTML = html;
  }

  let checklistState = {};
  let checkObs = {};
  let gpsData = null;

  function abrirInspeccion() {
    checklistState = {};
    checkObs = {};
    document.getElementById('insp-codigo-sub').textContent = `Equipo: ${datosCargados?.codigoQR || ''}`;
    renderInspeccion();
    document.getElementById('modal-inspeccion').classList.add('visible');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => { gpsData = { lat: p.coords.latitude, lng: p.coords.longitude, precision: p.coords.accuracy }; },
        () => { gpsData = null; }
      );
    }
  }

  function renderInspeccion(paso) {
    const body = document.getElementById('insp-body');
    if (paso === 'exito') {
      body.innerHTML = `<div class="msg-exito" style="margin-top:20px">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <div style="font-weight:800;font-size:18px;margin-bottom:8px">¡Inspección registrada!</div>
        <div id="exito-msg" style="font-size:13px;color:#374151"></div>
      </div>
      <button class="btn-guardar" style="background:linear-gradient(135deg,#2d6a4f,#1b4332);margin-top:8px" onclick="window.location.reload()">Ver equipo actualizado</button>`;
      return;
    }

    let html = '';
    html += `<div style="margin-bottom:8px;padding:12px;background:var(--morado-light);border-radius:12px;font-size:12px;color:var(--morado);font-weight:600">
      📋 NTC 2885 — Inspección mensual. Marca ✅ lo que está bien, ❌ lo que está mal o falta.</div>`;
    html += `<div class="campo-grupo"><label class="campo-label">Nombre *</label>
      <input class="campo-input" id="inp-nombre" placeholder="Tu nombre" /></div>`;
    html += `<div class="campo-grupo"><label class="campo-label">Apellido *</label>
      <input class="campo-input" id="inp-apellido" placeholder="Tu apellido" /></div>`;

    CHECKLIST.forEach(item => {
      const estado = checklistState[item.id];
      html += `<div class="checklist-item ${estado || ''}" id="ci-${item.id}">
        <div class="check-label">${item.label}</div>
        <div class="check-desc">${item.desc}</div>
        <div class="check-botones">
          <button class="check-btn ${estado === 'ok' ? 'selected-ok' : ''}" onclick="marcarCheck('${item.id}','ok')">✅ Bien</button>
          <button class="check-btn ${estado === 'mal' ? 'selected-mal' : ''}" onclick="marcarCheck('${item.id}','mal')">❌ Mal</button>
          <button class="check-btn ${estado === 'novedad' ? 'selected-novedad' : ''}" onclick="marcarCheck('${item.id}','novedad')">⚠️ Novedad</button>
        </div>
        ${estado === 'mal' || estado === 'novedad' ? `<div class="novedad-obs">
          <textarea id="obs-${item.id}" rows="2" placeholder="Describe lo que observas...">${checkObs[item.id]||''}</textarea></div>` : ''}
      </div>`;
    });

    html += `<div class="campo-grupo" style="margin-top:8px"><label class="campo-label">Observaciones generales</label>
      <textarea class="campo-input" id="inp-obs" rows="2" placeholder="Alguna observación adicional..." style="resize:none"></textarea></div>`;

    const total = CHECKLIST.length;
    const marcados = Object.keys(checklistState).length;
    const malos = Object.values(checklistState).filter(v => v === 'mal').length;
    const novedades = Object.values(checklistState).filter(v => v === 'novedad').length;

    if (marcados > 0) {
      const cls = malos > 0 ? 'mal' : novedades > 0 ? 'novedad' : 'aprobado';
      const icon = malos > 0 ? '❌' : novedades > 0 ? '⚠️' : '✅';
      const txt = malos > 0 ? `${malos} punto(s) requieren atención` : novedades > 0 ? `${novedades} novedad(es) reportada(s)` : '¡Todo en buen estado!';
      html += `<div class="resumen-check ${cls}"><div class="resumen-icon">${icon}</div>
        <div class="resumen-texto">${txt}</div>
        <div class="resumen-sub">${marcados}/${total} puntos revisados</div></div>`;
    }

    if (marcados < total) {
      html += `<div style="font-size:12px;color:var(--texto2);text-align:center;margin:8px 0">Faltan ${total - marcados} punto(s) por revisar</div>`;
    }

    html += `<div id="insp-error"></div>`;
    html += `<button class="btn-guardar" onclick="enviarInspeccion()" ${marcados < total ? 'disabled' : ''}>
      ${marcados < total ? `Completa los ${total - marcados} puntos restantes` : '✅ Guardar inspección'}</button>`;
    html += `<div style="font-size:11px;color:var(--texto2);text-align:center;margin-top:12px;padding-bottom:8px">
      Tu nombre, fecha, hora ${gpsData ? 'y ubicación GPS' : ''} quedarán registrados</div>`;

    body.innerHTML = html;

    CHECKLIST.forEach(item => {
      if (checkObs[item.id]) {
        const el = document.getElementById(`obs-${item.id}`);
        if (el) el.value = checkObs[item.id];
      }
    });
  }

  function marcarCheck(id, valor) {
    checklistState[id] = valor;
    if (valor === 'ok') delete checkObs[id];
    CHECKLIST.forEach(item => {
      const el = document.getElementById(`obs-${item.id}`);
      if (el) checkObs[item.id] = el.value;
    });
    const nombre = document.getElementById('inp-nombre')?.value || '';
    const apellido = document.getElementById('inp-apellido')?.value || '';
    const obs = document.getElementById('inp-obs')?.value || '';
    renderInspeccion();
    const n = document.getElementById('inp-nombre');
    const a = document.getElementById('inp-apellido');
    const o = document.getElementById('inp-obs');
    if (n) n.value = nombre;
    if (a) a.value = apellido;
    if (o) o.value = obs;
  }

  async function enviarInspeccion() {
    const nombre   = document.getElementById('inp-nombre')?.value?.trim() || '';
    const apellido = document.getElementById('inp-apellido')?.value?.trim() || '';
    const obs      = document.getElementById('inp-obs')?.value?.trim() || '';
    const errEl = document.getElementById('insp-error');
    if (!nombre) { errEl.innerHTML = '<div class="msg-error">Ingresa tu nombre</div>'; return; }
    if (!apellido) { errEl.innerHTML = '<div class="msg-error">Ingresa tu apellido</div>'; return; }

    CHECKLIST.forEach(item => {
      const el = document.getElementById(`obs-${item.id}`);
      if (el) checkObs[item.id] = el.value;
    });

    const btn = document.querySelector('#insp-body .btn-guardar');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
    errEl.innerHTML = '';

    try {
      const url = `${API}/qr/public/${encodeURIComponent(codigo)}/inspeccion${tenantParam ? '?t=' + tenantParam : ''}`;
      const checklist = {};
      CHECKLIST.forEach(item => { checklist[item.id] = checklistState[item.id] || 'ok'; });
      const obsChecklist = {};
      CHECKLIST.forEach(item => { if (checkObs[item.id]) obsChecklist[item.id] = checkObs[item.id]; });

      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inspectorNombre: nombre, inspectorApellido: apellido, checklist, obsChecklist, observaciones: obs, gps: gpsData, tenantId: tenantParam || undefined })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Error al guardar');
      renderInspeccion('exito');
      const msgEl = document.getElementById('exito-msg');
      if (msgEl) msgEl.textContent = data.mensaje || '';
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = '✅ Guardar inspección'; }
      errEl.innerHTML = `<div class="msg-error">${e.message}</div>`;
    }
  }

  async function abrirHistorial() {
    histPagina = 1;
    document.getElementById('hist-codigo-sub').textContent = `Equipo: ${datosCargados?.codigoQR || ''}`;
    document.getElementById('hist-body').innerHTML = '<div class="loading" style="min-height:150px"><div class="spinner"></div></div>';
    document.getElementById('modal-historial').classList.add('visible');
    await cargarHistorial(1, false);
  }

  async function cargarHistorial(pagina, acumular) {
    try {
      const url = `${API}/qr/public/${encodeURIComponent(codigo)}/inspecciones?limite=6&pagina=${pagina}${tenantParam ? '&t=' + tenantParam : ''}`;
      const r = await fetch(url);
      const data = await r.json();
      histHayMas = data.hayMas;
      const body = document.getElementById('hist-body');
      let html = acumular ? body.innerHTML.replace(/<button[^>]*Ver más[^<]*<\/button>/, '') : '';

      if (!data.inspecciones || data.inspecciones.length === 0) {
        body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--texto2)">Sin inspecciones registradas</div>';
        return;
      }

      data.inspecciones.forEach(ins => {
        const cls = ins.resultado === 'aprobado' ? 'aprobado' : ins.resultado === 'con_novedad' ? 'novedad' : 'atencion';
        const icon = ins.resultado === 'aprobado' ? '✅' : ins.resultado === 'con_novedad' ? '⚠️' : '❌';
        const label = ins.resultado === 'aprobado' ? 'Aprobada' : ins.resultado === 'con_novedad' ? 'Con novedad' : 'Requiere atención';
        html += `<div class="hist-item ${cls}">
          <div class="hist-fecha">${ins.fecha || ''} · ${ins.hora || ''}</div>
          <div class="hist-inspector">${ins.inspectorCompleto || ins.inspectorNombre || ''}</div>
          <span class="hist-badge ${cls}">${icon} ${label}</span>
          ${ins.novedades?.length > 0 ? `<div class="hist-novedades">⚠️ ${ins.novedades.join(' · ')}</div>` : ''}
          ${ins.observaciones ? `<div style="font-size:11px;color:var(--texto2);margin-top:4px;font-style:italic">"${ins.observaciones}"</div>` : ''}
        </div>`;
      });

      if (data.hayMas) {
        html += `<button class="btn-ver-mas" onclick="verMasHistorial()">Ver más inspecciones</button>`;
      }
      html += `<div style="font-size:11px;color:var(--texto2);text-align:center;padding:8px 0">Generado por tucontrol360.com · ${new Date().toLocaleDateString('es-CO')}</div>`;
      body.innerHTML = html;
    } catch (e) {
      document.getElementById('hist-body').innerHTML = '<div style="padding:24px;text-align:center;color:var(--rojo)">Error al cargar historial</div>';
    }
  }

  async function verMasHistorial() {
    histPagina++;
    await cargarHistorial(histPagina, true);
  }

  async function verTodosEquipos(clienteId, adminId, propietario) {
    const body = document.getElementById('lista-body');
    document.getElementById('lista-titulo').textContent = propietario || 'Mis Extintores';
    body.innerHTML = '<div class="loading" style="min-height:200px"><div class="spinner"></div></div>';
    document.getElementById('modal-lista').classList.add('visible');

    try {
      const r = await fetch(`${API}/qr/public/cliente/${clienteId}?adminId=${adminId}`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      const empresa = data.empresa || {};

      const totalInsp  = data.equipos.filter(e => e.ultimaInspeccion).length;
      const sinInsp    = data.equipos.length - totalInsp;
      const conNovedad = data.equipos.filter(e => e.ultimaInspeccion && e.ultimaInspeccion.resultado !== 'aprobado').length;

      document.getElementById('lista-sub').textContent = `${data.totalEquipos} equipo(s)${data.equiposVencidos > 0 ? ` · ${data.equiposVencidos} vencido(s)` : ''}`;

      let html = `<div class="rpt-header">
        <div class="rpt-header-left">
          ${empresa.logo
            ? `<img class="rpt-logo" src="${empresa.logo}" alt="${empresa.nombre}" />`
            : `<div class="rpt-logo-inicial">${(empresa.nombre||'E')[0]}</div>`}
        </div>
        <div class="rpt-header-right">
          <div class="rpt-doc-titulo">${empresa.nombre || 'Servicio de Extintores'}</div>
          <div class="rpt-empresa-sub" style="text-align:right;margin-top:4px">
            ${empresa.nit ? 'NIT: ' + empresa.nit + '<br/>' : ''}
            ${(empresa.phone || empresa.cellphone) ? 'Tel: ' + (empresa.phone || empresa.cellphone) + '<br/>' : ''}
            ${empresa.address ? empresa.address + '<br/>' : ''}
            ${empresa.email ? empresa.email : ''}
          </div>
          <div style="margin-top:8px;font-size:10px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:1px">Reporte de inspección mensual</div>
          <div style="font-size:10px;color:#9ca3af;margin-top:2px">${new Date().toLocaleDateString('es-CO', {day:'2-digit',month:'long',year:'numeric'})}</div>
        </div>
      </div>`;

      html += `<div class="rpt-cliente-strip">
        <div><div class="rpt-meta-label">Cliente</div><div class="rpt-meta-valor">${propietario}</div></div>
        <div><div class="rpt-meta-label">Total equipos</div><div class="rpt-meta-valor">${data.totalEquipos}</div></div>
        <div><div class="rpt-meta-label">Inspeccionados</div><div class="rpt-meta-valor" style="color:#16a34a">${totalInsp}</div></div>
        <div><div class="rpt-meta-label">Sin inspección</div><div class="rpt-meta-valor" style="color:#d97706">${sinInsp}</div></div>
        <div><div class="rpt-meta-label">Con novedad</div><div class="rpt-meta-valor" style="color:#dc2626">${conNovedad}</div></div>
      </div>`;

      if (!data.equipos?.length) {
        html += `<div style="text-align:center;padding:32px;color:var(--texto2)">Sin equipos registrados</div>`;
      } else {
        html += `<div class="rpt-tabla-wrap"><table class="rpt-tabla">
          <thead>
            <tr>
              <th rowspan="2">No.</th>
              <th rowspan="2">Código</th>
              <th rowspan="2">Tipo</th>
              <th rowspan="2">Cap.</th>
              <th rowspan="2">Ubicación</th>
              <th rowspan="2">F. Recarga</th>
              <th rowspan="2">F. Vence</th>
              <th rowspan="2">F. PH</th>
              <th colspan="8">Checklist de inspección</th>
              <th rowspan="2">Resultado</th>
              <th rowspan="2">F. Inspección</th>
              <th rowspan="2">Inspector</th>
              <th rowspan="2">Novedades / Observaciones</th>
            </tr>
            <tr>${CHECKLIST_LABELS.map(c => `<th>${c.label}</th>`).join('')}</tr>
          </thead>
          <tbody>`;

        data.equipos.forEach((eq, i) => {
          const ins = eq.ultimaInspeccion;
          const cl = ins?.checklist || {};
          const esNov = ins && ins.resultado !== 'aprobado';
          html += `<tr class="${eq.vencido ? 'fila-vencida' : ''}">
            <td>${i + 1}</td>
            <td class="rpt-cod">${eq.codigoQR || '—'}</td>
            <td class="td-left">${eq.tipo || '—'}</td>
            <td>${eq.capacidad || '—'}</td>
            <td class="td-left">${eq.ubicacion || '—'}</td>
            <td>${fmtFecha(eq.fechaUltimaRecarga)}</td>
            <td style="${eq.vencido ? 'color:#dc2626;font-weight:700' : ''}">${fmtFecha(eq.proximaRecarga)}${eq.vencido ? ' ⚠' : ''}</td>
            <td>${eq.requierePH ? fmtFecha(eq.fechaPH) : '<span class="rpt-sin">—</span>'}</td>
            ${CHECKLIST_LABELS.map(c => `<td>${ins ? iconCheck(cl[c.id]) : '<span class="rpt-sin">—</span>'}</td>`).join('')}
            <td>${ins ? (esNov ? '<span class="rpt-badge-nov">⚠ Novedad</span>' : '<span class="rpt-badge-ok">✅ Ok</span>') : '<span class="rpt-badge-sin">Sin insp.</span>'}</td>
            <td>${ins ? fmtFecha(ins.fecha) : '<span class="rpt-sin">—</span>'}</td>
            <td class="td-left">${ins ? (((ins.inspectorNombre||'') + (ins.inspectorApellido ? ' '+ins.inspectorApellido : '')) || '—') : '<span class="rpt-sin">—</span>'}</td>
            <td class="rpt-obs">${ins?.observaciones ? ins.observaciones : '<span class="rpt-sin">—</span>'}</td>
          </tr>`;
        });

        html += `</tbody></table></div>`;
      }

      html += `<div class="rpt-footer">
        <div class="rpt-footer-msg">
          Si su equipo presenta <strong>novedades</strong>, comuníquese para programar una visita técnica. Su seguridad es nuestra prioridad.
          ${empresa.phone || empresa.cellphone ? `<br/><span style="font-size:10px;color:#6b7280">📞 ${empresa.phone || empresa.cellphone}</span>` : ''}
        </div>
        <div class="rpt-footer-c360">
          Generado por <a href="https://tucontrol360.com" target="_blank">tucontrol360.com</a><br/>
          Sistema operativo para empresas de servicios
        </div>
      </div>`;

      body.innerHTML = html;
    } catch (e) {
      body.innerHTML = '<div style="padding:32px;text-align:center;color:var(--rojo)">Error al cargar equipos</div>';
    }
  }

  function imprimirLista() {
    document.getElementById('modal-lista').classList.add('visible');
    setTimeout(() => window.print(), 300);
  }

  function mostrarError(titulo, sub) {
    document.getElementById('app').innerHTML = `<div class="error-state">
      <div class="error-icon">🔍</div>
      <div class="error-titulo">${titulo}</div>
      <div class="error-sub">${sub}</div></div>
      <div class="footer-c360">Powered by <a href="https://tucontrol360.com" target="_blank">tucontrol360.com</a></div>`;
    document.getElementById('loading').style.display = 'none';
  }

  ['modal-lista','modal-inspeccion','modal-historial'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) cerrarModal(id);
    });
  });
</script>
</body>
</html>
